<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registro - Sistema Vivero</title>
        <link rel="stylesheet" th:href="@{/styles/styles.css}" />
    </head>
    <body>
        <div class="login-container">
            <div class="login-card">

                <div class="login-header">
                    <h1>Alta de Usuario</h1>
                    <p>Completa tus datos para ingresar al sistema</p>
                </div>

                <form th:action="@{/registro}" th:object="${usuario}" method="post">

                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" th:field="*{nombre}" class="form-input" required />
                    </div>

                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" th:field="*{apellido}" class="form-input" required />
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" th:field="*{email}" class="form-input" required />
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" th:field="*{pswd}" class="form-input" required />
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                        Registrar y Guardar
                    </button>

                    <a th:href="@{/login}" class="btn btn-secondary" style="display: block; text-align: center; margin-top: 0.5rem; text-decoration: none;">
                        Regresar al Login
                    </a>
                </form>

            </div>
        </div>
    </body>
</html>
