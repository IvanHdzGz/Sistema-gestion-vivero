<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Proveedores - Sistema Vivero</title>
        <link rel="stylesheet" th:href="@{/styles/styles.css}" />
    </head>
    <body>
        <div class="main-layout">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-icon">
                        <img th:src="@{/img/flor_loto.png}" alt="Flor de Loto" width="20" height="20" />
                    </div>
                    <div class="sidebar-title">
                        <h2>Vivero</h2>
                        <p class="sidebar-subtitle">Sistema de Gestión</p>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <ul>
                        <li>
                            <a th:href="@{/dashboard}"><svg class="icon" viewBox="0 0 24 24">
                                <rect x="3" y="3" width="7" height="7"></rect>
                                <rect x="14" y="3" width="7" height="7"></rect>
                                <rect x="14" y="14" width="7" height="7"></rect>
                                <rect x="3" y="14" width="7" height="7"></rect></svg>Dashboard</a>
                        </li>
                        <li>
                            <a th:href="@{/clientes}"><svg class="icon" viewBox="0 0 24 24">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>Clientes</a>
                        </li>
                        <li>
                            <a th:href="@{/pedidos}"><svg class="icon" viewBox="0 0 24 24">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>Pedidos</a>
                        </li>
                        <li>
                            <a th:href="@{/productos}"><svg class="icon" viewBox="0 0 24 24">
                                <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line>
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                                <line x1="12" y1="22.08" x2="12" y2="12"></line></svg>Inventario</a>
                        </li>
                        <li>
                            <a th:href="@{/proveedores}" class="active"><svg class="icon" viewBox="0 0 24 24">
                                <rect x="1" y="3" width="15" height="13"></rect>
                                <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                                <circle cx="5.5" cy="18.5" r="2.5"></circle>
                                <circle cx="18.5" cy="18.5" r="2.5"></circle></svg>Proveedores</a>
                        </li>
                    </ul>
                </nav>

                <div class="sidebar-footer">
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn-logout">
                            <svg class="icon" viewBox="0 0 24 24">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                            Cerrar Sesión
                        </button>
                    </form>
                </div>
            </aside>

            <main class="main-content">
                <div class="page-header">
                    <div class="page-title">
                        <h1>Proveedores</h1>
                        <p>Administra tus proveedores</p>
                    </div>
                    <button class="btn btn-primary" onclick="openModalNew()">
                        <svg class="icon" viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Nuevo Proveedor
                    </button>
                </div>

                <div class="card">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(proveedores)}">
                                    <td colspan="3" class="table-empty">
                                        No hay proveedores registrados. Haz clic en "Nuevo Proveedor" para agregar uno.
                                    </td>
                                </tr>
                                <tr th:each="p : ${proveedores}">
                                    <td th:text="${p.prov_id}">1</td>
                                    <td th:text="${p.prov_nombre}">Proveedor Ejemplo</td>
                                    <td>
                                        <button class="btn-edit" 
                                                th:onclick="openModalEdit([[${p.prov_id}]], [[${p.prov_nombre}]])" 
                                                style="background: none; border: none; cursor: pointer; margin-right: 10px;">
                                            <svg class="icon" viewBox="0 0 24 24" style="stroke: #0284c7; width: 18px; height: 18px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"></path></svg>
                                        </button>
                                        <a th:href="@{/proveedores/eliminar/{id}(id=${p.prov_id})}" 
                                           onclick="return confirm('¿Seguro que deseas eliminar este proveedor?');">
                                            <svg class="icon" viewBox="0 0 24 24" style="stroke: #ef4444; width: 18px; height: 18px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>

        <div id="proveedorModal" class="modal-overlay hidden">
            <div class="modal" style="max-width: 28rem">
                <div class="modal-header">
                    <h2 id="modalTitle">Nuevo Proveedor</h2>
                    <button class="btn-icon" onclick="closeModal()">
                        <svg class="icon" viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="modal-body">
                    <form th:action="@{/proveedores/guardar}" th:object="${nuevoProveedor}" method="post">
                        <input type="hidden" id="prov_id" th:field="*{prov_id}" />

                        <div class="form-group">
                            <label for="prov_nombre">Nombre del Proveedor</label>
                            <input type="text" id="prov_nombre" th:field="*{prov_nombre}" class="form-input" required />
                        </div>

                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            const modal = document.getElementById('proveedorModal');
            const modalTitle = document.getElementById('modalTitle');
            const inputId = document.getElementById('prov_id');
            const inputNombre = document.getElementById('prov_nombre');

            function openModalNew() {
            modalTitle.innerText = "Nuevo Proveedor";
            inputId.value = ""; // ID vacío significa registro nuevo
            inputNombre.value = "";
            modal.classList.remove('hidden');
            }

            function openModalEdit(id, nombre) {
            modalTitle.innerText = "Editar Proveedor";
            inputId.value = id; // Al rellenar el ID, Spring Boot sabe que debe actualizar en vez de insertar
            inputNombre.value = nombre;
            modal.classList.remove('hidden');
            }

            function closeModal() {
            modal.classList.add('hidden');
            }
        </script>
    </body>
</html>
